# Optional anti-bot services for datahelm/crawler.
#
# Usage (from the package repo root):
#   docker compose -f docker/compose.services.yml up -d
#
# Laravel on the host (.env):
#   BROWSERLESS_URL=http://localhost:3010
#   FLARESOLVERR_URL=http://localhost:8191
#
# Laravel inside Docker on the same Compose network:
#   BROWSERLESS_URL=http://browserless:3000
#   FLARESOLVERR_URL=http://flaresolverr:8191

services:
  browserless:
    image: browserless/chrome:latest
    container_name: datahelm_browserless
    environment:
      MAX_CONCURRENT_SESSIONS: 5
      CONNECTION_TIMEOUT: 60000
      DEFAULT_STEALTH: "true"
    ports:
      - "3010:3000"
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: datahelm_flaresolverr
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
    ports:
      - "8191:8191"
    restart: unless-stopped
